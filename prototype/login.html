<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 肿瘤数智化筛查系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 90%;
        }
        
        .login-left {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .login-left h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .login-right {
            padding: 60px 40px;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="row g-0">
            <!-- 左侧信息 -->
            <div class="col-md-5 login-left">
                <div class="mb-4">
                    <i class="bi bi-heart-pulse-fill" style="font-size: 3rem;"></i>
                </div>
                <h2>欢迎回来</h2>
                <p class="mb-4">登录以继续使用肿瘤智能筛查服务</p>
                
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="bi bi-shield-check"></i>
                    </div>
                    <div>安全可靠的数据保护</div>
                </div>
                
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="bi bi-speedometer2"></i>
                    </div>
                    <div>快速准确的AI评估</div>
                </div>
                
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="bi bi-graph-up"></i>
                    </div>
                    <div>专业的健康建议</div>
                </div>
            </div>
            
            <!-- 右侧表单 -->
            <div class="col-md-7 login-right">
                <div class="mb-4">
                    <h3>登录账号</h3>
                    <p class="text-muted">还没有账号？<a href="register.html">立即注册</a></p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">邮箱/手机号</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="username" 
                                   placeholder="请输入邮箱或手机号" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" 
                                   placeholder="请输入密码" required>
                        </div>
                    </div>
                    
                    <div class="mb-3 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">
                                记住我
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-login w-100">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                    
                    <div class="text-center mt-4">
                        <a href="index.html" class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left"></i> 返回首页
                        </a>
                    </div>
                </form>
                
                <!-- 演示账号 -->
                <div class="alert alert-info mt-4">
                    <i class="bi bi-info-circle"></i> <strong>演示账号</strong><br>
                    普通用户：user@demo.com / 123456<br>
                    医生：doctor@demo.com / 123456<br>
                    管理员：admin@demo.com / 123456
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 模拟登录验证
            if (password === '123456') {
                // 保存用户信息
                let role = 'user';
                if (username.includes('admin')) role = 'admin';
                else if (username.includes('doctor')) role = 'doctor';
                
                localStorage.setItem('user', JSON.stringify({
                    email: username,
                    nickname: username.split('@')[0],
                    role: role
                }));
                localStorage.setItem('token', 'demo_token_' + Date.now());
                
                // 显示成功提示
                alert('登录成功！');
                
                // 根据角色跳转
                if (role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'questionnaire.html';
                }
            } else {
                alert('账号或密码错误！\n提示：演示密码为 123456');
            }
        });
    </script>
</body>
</html>
